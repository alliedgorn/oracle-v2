<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#a0845e"/>
      <stop offset="100%" stop-color="#5c3d1e"/>
    </radialGradient>
    <radialGradient id="fur" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c4a06a"/>
      <stop offset="70%" stop-color="#8b6834"/>
      <stop offset="100%" stop-color="#6b4f28"/>
    </radialGradient>
    <radialGradient id="chest" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#e8d5a8"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f0ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b8d8f0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>

  <!-- Body/torso (sleek, elongated) -->
  <ellipse cx="128" cy="185" rx="38" ry="55" fill="#8b6834"/>

  <!-- Chest patch (lighter cream belly) -->
  <ellipse cx="128" cy="178" rx="22" ry="35" fill="url(#chest)"/>

  <!-- Head (rounded, slightly elongated ferret shape) -->
  <ellipse cx="128" cy="105" rx="48" ry="52" fill="url(#fur)"/>

  <!-- Head highlight -->
  <ellipse cx="118" cy="85" rx="20" ry="16" fill="#d4b87a" opacity="0.3"/>

  <!-- Ears -->
  <ellipse cx="92" cy="68" rx="14" ry="11" fill="#8b6834"/>
  <ellipse cx="92" cy="68" rx="9" ry="7" fill="#e8c8a0"/>
  <ellipse cx="164" cy="68" rx="14" ry="11" fill="#8b6834"/>
  <ellipse cx="164" cy="68" rx="9" ry="7" fill="#e8c8a0"/>

  <!-- Face mask (dark ferret mask around eyes) -->
  <path d="M88 100 Q100 92 118 95 Q128 96 138 95 Q156 92 168 100 Q172 108 168 118 Q156 125 138 120 Q128 118 118 120 Q100 125 88 118 Q84 108 88 100" fill="#4a3520" opacity="0.7"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="108" cy="108" rx="10" ry="11" fill="#1a0f05"/>
  <ellipse cx="108" cy="108" rx="7" ry="8" fill="#2d1a0a"/>
  <circle cx="110" cy="105" r="3.5" fill="white"/>
  <circle cx="106" cy="111" r="1.5" fill="white" opacity="0.5"/>

  <!-- Right eye -->
  <ellipse cx="148" cy="108" rx="10" ry="11" fill="#1a0f05"/>
  <ellipse cx="148" cy="108" rx="7" ry="8" fill="#2d1a0a"/>
  <circle cx="150" cy="105" r="3.5" fill="white"/>
  <circle cx="146" cy="111" r="1.5" fill="white" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="128" cy="124" rx="5" ry="3.5" fill="#3d2415"/>
  <circle cx="128" cy="123" r="1" fill="#5a3a22" opacity="0.5"/>

  <!-- Tiny whiskers -->
  <line x1="110" y1="122" x2="88" y2="118" stroke="#c4a06a" stroke-width="0.8" opacity="0.6"/>
  <line x1="110" y1="125" x2="86" y2="126" stroke="#c4a06a" stroke-width="0.8" opacity="0.6"/>
  <line x1="110" y1="128" x2="88" y2="134" stroke="#c4a06a" stroke-width="0.8" opacity="0.6"/>
  <line x1="146" y1="122" x2="168" y2="118" stroke="#c4a06a" stroke-width="0.8" opacity="0.6"/>
  <line x1="146" y1="125" x2="170" y2="126" stroke="#c4a06a" stroke-width="0.8" opacity="0.6"/>
  <line x1="146" y1="128" x2="168" y2="134" stroke="#c4a06a" stroke-width="0.8" opacity="0.6"/>

  <!-- Subtle mouth -->
  <path d="M120 132 Q128 137 136 132" fill="none" stroke="#5a3a22" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tiny spectacles -->
  <!-- Left lens -->
  <circle cx="108" cy="108" r="14" fill="url(#glass)" stroke="#8b7355" stroke-width="1.8"/>
  <!-- Right lens -->
  <circle cx="148" cy="108" r="14" fill="url(#glass)" stroke="#8b7355" stroke-width="1.8"/>
  <!-- Bridge -->
  <path d="M122 108 Q128 112 134 108" fill="none" stroke="#8b7355" stroke-width="1.8"/>
  <!-- Temple arms (going to ears) -->
  <line x1="94" y1="108" x2="85" y2="90" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="162" y1="108" x2="171" y2="90" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Paws holding a tiny planner -->
  <!-- Left paw -->
  <ellipse cx="108" cy="210" rx="12" ry="8" fill="#8b6834"/>
  <!-- Right paw -->
  <ellipse cx="148" cy="210" rx="12" ry="8" fill="#8b6834"/>

  <!-- Tiny planner/notebook -->
  <g transform="translate(112, 198)">
    <rect x="0" y="0" width="32" height="24" rx="2" fill="#f5f0e6" stroke="#8b7355" stroke-width="1"/>
    <line x1="16" y1="0" x2="16" y2="24" stroke="#c4a06a" stroke-width="0.5"/>
    <!-- Planner lines -->
    <line x1="4" y1="6" x2="14" y2="6" stroke="#b8a080" stroke-width="0.6"/>
    <line x1="4" y1="10" x2="12" y2="10" stroke="#b8a080" stroke-width="0.6"/>
    <line x1="4" y1="14" x2="14" y2="14" stroke="#b8a080" stroke-width="0.6"/>
    <line x1="4" y1="18" x2="10" y2="18" stroke="#b8a080" stroke-width="0.6"/>
    <!-- Check marks -->
    <path d="M19 6 L21 8 L25 4" fill="none" stroke="#4ade80" stroke-width="0.8"/>
    <path d="M19 10 L21 12 L25 8" fill="none" stroke="#4ade80" stroke-width="0.8"/>
    <circle cx="22" cy="16" r="2" fill="none" stroke="#b8a080" stroke-width="0.6"/>
  </g>

  <!-- Paw toes (over planner) -->
  <circle cx="100" cy="210" r="3" fill="#7a5c2e"/>
  <circle cx="106" cy="206" r="3" fill="#7a5c2e"/>
  <circle cx="112" cy="206" r="3" fill="#7a5c2e"/>
  <circle cx="150" cy="206" r="3" fill="#7a5c2e"/>
  <circle cx="156" cy="206" r="3" fill="#7a5c2e"/>
  <circle cx="156" cy="212" r="3" fill="#7a5c2e"/>
</svg>